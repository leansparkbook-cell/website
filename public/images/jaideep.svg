<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E66E21;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#C85A15;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="96" cy="96" r="96" fill="url(#grad1)"/>

  <!-- Subtle pattern overlay -->
  <circle cx="96" cy="96" r="96" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
  <circle cx="96" cy="96" r="80" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- Initials -->
  <text
    x="96"
    y="96"
    font-family="Georgia, serif"
    font-size="64"
    font-weight="600"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
    filter="url(#shadow)"
  >JP</text>
</svg>
